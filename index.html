<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>cool snake game</title>
<style>
  body {
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* URL-style website name */
  .url {
    margin-top: 20px;
    font-size: 22px;
    color: #555;
    font-family: "Courier New", monospace;
    background: #e8e8e8;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  #score {
    font-size: 20px;
    margin: 10px 0;
    color: #4285f4;
    font-weight: bold;
  }

  canvas {
    background: #ffffff;
    border: 4px solid #dadce0;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div class="url">swansnake.onrender.com</div>
<div id="score">Score: 0</div>
<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

const grid = 20;
const tileCount = 20;

let snake = [{ x: 10, y: 10 }];
let vx = 1;
let vy = 0;
let apple = spawnApple();
let score = 0;

const TARGET_SCORE = 5;
const YOUTUBE_URL = "https://www.youtube.com/shorts/-_PeK_aYYAA";

document.addEventListener("keydown", keyPress);

function keyPress(e) {
  if (e.key === "ArrowUp" && vy === 0) { vx = 0; vy = -1; }
  else if (e.key === "ArrowDown" && vy === 0) { vx = 0; vy = 1; }
  else if (e.key === "ArrowLeft" && vx === 0) { vx = -1; vy = 0; }
  else if (e.key === "ArrowRight" && vx === 0) { vx = 1; vy = 0; }
}

function spawnApple() {
  return {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
}

function gameLoop() {
  const head = {
    x: snake[0].x + vx,
    y: snake[0].y + vy
  };

  // wrap around edges
  if (head.x < 0) head.x = tileCount - 2;
  if (head.x >= tileCount) head.x = 0;
  if (head.y < 0) head.y = tileCount - 1;
  if (head.y >= tileCount) head.y = 0;

  snake.unshift(head);

  // apple eaten
  if (head.x === apple.x && head.y === apple.y) {
    score++;
    scoreDisplay.textContent = "Score: " + score;
    apple = spawnApple();

    if (score >= TARGET_SCORE) {
      window.location.href = YOUTUBE_URL;
      return;
    }
  } else {
    snake.pop();
  }

  // self collision
  for (let i = 1; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
      alert("Game Over!");
      document.location.reload();
      return;
    }
  }

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // apple
  ctx.fillStyle = "#ea4335";
  ctx.fillRect(apple.x * grid, apple.y * grid, grid, grid);

  // snake
  ctx.fillStyle = "#34a853";
  snake.forEach(part => {
    ctx.fillRect(part.x * grid, part.y * grid, grid, grid);
  });
}

setInterval(gameLoop, 100);
</script>

</body>
</html>
